<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Chatbot</title>

  <!-- Markdown + Code Highlight -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .chat-container {
      max-width: 900px;
      margin: auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      background: #1e293b;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
    }

    .messages-box {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .message {
      display: flex;
      margin-bottom: 15px;
    }

    .sent { justify-content: flex-end; }
    .received { justify-content: flex-start; }

    .bubble {
      max-width: 75%;
      padding: 12px;
      border-radius: 12px;
      white-space: pre-wrap;
    }

    .sent .bubble { background: #2563eb; }
    .received .bubble { background: #1e293b; }

    .message-form {
      display: flex;
      padding: 10px;
      background: #1e293b;
    }

    .message-input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
    }

    .btn-send {
      margin-left: 10px;
      padding: 10px 20px;
      border-radius: 20px;
      background: #2563eb;
      color: white;
      border: none;
    }

    pre {
      background: #020617;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="chat-container">

  <div class="chat-header">💬 AI Chatbot</div>

  <div class="messages-box" id="messagesBox"></div>

  <!-- ✅ CSRF TOKEN ADDED -->
  <form class="message-form">
    {% csrf_token %}
    <input type="text" name="message" class="message-input" placeholder="Type a message..." />
    <button class="btn-send">Send</button>
  </form>

</div>

<script>
const form = document.querySelector('.message-form');
const input = document.querySelector('.message-input');
const messagesBox = document.getElementById('messagesBox');

function getCSRFToken() {
  return document.querySelector('[name=csrfmiddlewaretoken]').value;
}

function scrollToBottom() {
  messagesBox.scrollTop = messagesBox.scrollHeight;
}

form.addEventListener('submit', function(e) {
  e.preventDefault();

  const message = input.value.trim();
  if (!message) return;

  // Show user message
  messagesBox.innerHTML += `
    <div class="message sent">
      <div class="bubble">${message}</div>
    </div>
  `;

  input.value = '';
  scrollToBottom();

  // Typing indicator
  const typingDiv = document.createElement('div');
  typingDiv.innerText = "AI is typing...";
  messagesBox.appendChild(typingDiv);

  fetch('', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded',
      'X-CSRFToken': getCSRFToken()   // ✅ FIX HERE
    },
    body: new URLSearchParams({
      'message': message
    })
  })
  .then(res => res.json())
  .then(data => {
    typingDiv.remove();

    const botDiv = document.createElement('div');
    botDiv.classList.add('message', 'received');

    const bubble = document.createElement('div');
    bubble.classList.add('bubble');

    botDiv.appendChild(bubble);
    messagesBox.appendChild(botDiv);

    const lines = data.response.split('\n');
    let i = 0;

    function typeLine() {
      if (i < lines.length) {
        bubble.innerHTML += marked.parse(lines[i] + '\n');
        i++;
        scrollToBottom();
        setTimeout(typeLine, 100);
      } else {
        document.querySelectorAll('pre code').forEach((block) => {
          hljs.highlightElement(block);
        });
      }
    }

    typeLine();
  });
});
</script>

</body>
</html>
